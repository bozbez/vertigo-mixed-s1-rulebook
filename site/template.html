<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Vertigo Mixed S1 — Trackmania competition rulebook">
<meta name="color-scheme" content="light dark">
<title>{title}</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="style.css">
<script>
  // Apply theme synchronously to avoid flash of unstyled content
  (function () {{
    try {{
      var t = localStorage.getItem('vertigo-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    }} catch (e) {{
      document.documentElement.setAttribute('data-theme', 'dark');
    }}
  }})();
</script>
</head>
<body>
<header class="site-header">
  <div class="header-controls">
    <div class="time-toggle" role="group" aria-label="Time display">
      <button type="button" data-mode="local" class="active">Local</button>
      <button type="button" data-mode="cest">CEST</button>
    </div>
    <button class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
    <svg class="icon icon-moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon icon-sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <circle fill="currentColor" cx="12" cy="12" r="4"/>
      <g stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
        <line x1="12" y1="2"  x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="5"  y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="4.93"  x2="7.05"  y2="7.05"/>
        <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
        <line x1="4.93" y1="19.07" x2="7.05"  y2="16.95"/>
        <line x1="16.95" y1="7.05"  x2="19.07" y2="4.93"/>
      </g>
    </svg>
  </button>
  </div>
  <picture class="logo">
    <img class="logo-dark"  src="assets/logo-dark.png"  alt="Vertigo">
    <img class="logo-light" src="assets/logo-light.png" alt="Vertigo">
  </picture>
  <p class="version">Season {season} - Rulebook {version} - last updated {last_updated}</p>
</header>
<div class="notice-bar">{notice}</div>
<main class="grid">
{panels}
</main>
<script src="timezone.js" defer></script>
<script src="theme.js" defer></script>
</body>
</html>
